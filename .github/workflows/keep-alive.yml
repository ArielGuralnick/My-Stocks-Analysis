name: Keep Render service awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/quotes
        run: curl -fsS --max-time 90 --retry 2 "https://portfolio-sentinel-dashboard.onrender.com/api/quotes?symbols=NVDA"
